name: Build Windows Server 2019

on:  
  push:
  pull_request:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-2019

    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        submodules:  'true'
        fetch-depth: 0
      
    - name: Download NPCAP
      run: |
        cd %GITHUB_WORKSPACE%
        powershell -Command "& 'build\windows\download_npcap.ps1'"
      shell: cmd

    - name: CMake Debug
      run: |
        mkdir "${{ runner.workspace }}\_build\sdk"
        cd "${{ runner.workspace }}/_build\sdk"
        cmake %GITHUB_WORKSPACE% -G "Visual Studio 16 2019" -A x64 -T v140 ^
        -DECAL_CORE_COMPONENT_ENABLER_C_BINDING=ON ^
        -DECAL_CORE_COMPONENT_ENABLE_CONFIG=ON ^
        -DECAL_CORE_COMPONENT_ENABLE_PROCESS_STUB=OFF ^
        -DECAL_CORE_COMPONENT_ENABLE_SAMPLES=OFF ^
        -DECAL_CORE_COMPONENT_ENABLE_TESTS=OFF ^
        -DECAL_CORE_COMPONENT_INSTALL_SAMPLE_SOURCE=OFF ^
        -DECAL_CORE_FEATURE_ENABLE_CAPNPROTO=OFF ^
        -DECAL_CORE_FEATURE_ENABLE_NPCAP=ON ^
        -DECAL_CORE_FEATURE_ENABLE_ICEORYX=OFF ^
        -DECAL_CORE_THIRDPARTY_BUILD_CMAKEFUNCTIONS=ON ^
        -DECAL_CORE_THIRDPARTY_BUILD_TCP_PUBSUB=ON ^
        -DECAL_CORE_THIRDPARTY_BUILD_RECYCLE=ON ^
        -DECAL_CORE_THIRDPARTY_BUILD_GTEST=OFF ^
        -DECAL_CORE_THIRDPARTY_BUILD_PROTOBUF=ON
      shell: cmd

    - name: CMake Complete
      run: |
        mkdir "${{ runner.workspace }}\_build\complete"
        cd "${{ runner.workspace }}/_build\complete"
        cmake %GITHUB_WORKSPACE% -G "Visual Studio 16 2019" -A x64 -T v140 ^
        -DECAL_CORE_COMPONENT_ENABLER_C_BINDING=ON ^
        -DECAL_CORE_COMPONENT_ENABLE_CONFIG=ON ^
        -DECAL_CORE_COMPONENT_ENABLE_PROCESS_STUB=OFF ^
        -DECAL_CORE_COMPONENT_ENABLE_SAMPLES=ON ^
        -DECAL_CORE_COMPONENT_ENABLE_TESTS=ON ^
        -DECAL_CORE_COMPONENT_INSTALL_SAMPLE_SOURCE=ON ^
        -DECAL_CORE_FEATURE_ENABLE_CAPNPROTO=OFF ^
        -DECAL_CORE_FEATURE_ENABLE_NPCAP=ON ^
        -DECAL_CORE_FEATURE_ENABLE_ICEORYX=OFF ^
        -DECAL_CORE_THIRDPARTY_BUILD_CMAKEFUNCTIONS=ON ^
        -DECAL_CORE_THIRDPARTY_BUILD_TCP_PUBSUB=ON ^
        -DECAL_CORE_THIRDPARTY_BUILD_RECYCLE=ON ^
        -DECAL_CORE_THIRDPARTY_BUILD_GTEST=ON ^
        -DECAL_CORE_THIRDPARTY_BUILD_PROTOBUF=ON
        mkdir "%ALLUSERSPROFILE%\eCAL"
        copy "%GITHUB_WORKSPACE%\ecal\core\cfg\ecal.ini" "%ALLUSERSPROFILE%\eCAL"
      shell: cmd

    - name: Build Debug
      run: cmake --build . --config Debug
      working-directory: ${{ runner.workspace }}/_build/sdk

    - name: Build Release
      run: cmake --build . --config Release
      working-directory: ${{ runner.workspace }}/_build/complete

    - name: Run Tests
      run: ctest -C Release -V
      working-directory: ${{ runner.workspace }}/_build/complete

